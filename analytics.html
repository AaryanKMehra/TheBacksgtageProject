<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analytics | Stage Lead Studio</title>
    <link rel="stylesheet" href="css/HomePage.css">
    <script>
        // --- HARD LOCK FOR CREW ---
        // If a crew member tries to access this page, redirect them immediately.
        if (localStorage.getItem('userRole') === 'crew') {
            window.location.replace('index.html');
        }
    </script>
    <style>
        .analytics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        #timer-display {
            font-size: 5rem;
            font-weight: 200;
            font-family: 'Courier New', Courier, monospace;
            margin: 2rem 0;
            letter-spacing: -2px;
            color: var(--text-ink);
        }

        .note-vault {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #notesArea {
            flex-grow: 1;
            background: var(--surface-white);
            border: 2px solid var(--border-ink);
            color: var(--text-ink);
            padding: 1.5rem;
            font-family: var(--font-main);
            resize: none;
            line-height: 1.8;
            font-weight: 500;
        }

        .summary-metric {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent-navy);
        }

        @media (max-width: 900px) {
            .analytics-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">STAGE LEAD</div>
        <ul>
            <li><a href="index.html">Vault</a></li>
            <li><a href="props.html">Map</a></li>
            <li><a href="cues.html">Cues</a></li>
            <li><a href="analytics.html" class="active">Analytics</a></li>
        </ul>
    </nav>

    <main>
        <div class="section-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
            <h1>Performance Analytics</h1>
            <span id="role-badge" style="font-size: 0.7rem; font-weight: bold; padding: 4px 8px; background: var(--accent-navy); color: var(--surface-white); border-radius: 4px;">DIRECTOR ONLY</span>
        </div>

        <div class="analytics-grid">
            <div class="studio-card">
                <div class="summary-metric">Active Run Time</div>
                <div id="timer-display">00:00:00</div>
                <div style="display: flex; gap: 10px;">
                    <button id="startBtn" onclick="toggleTimer()">Start Session</button>
                    <button class="secondary" onclick="resetTimer()">Reset</button>
                </div>
            </div>

            <div class="studio-card note-vault">
                <div class="summary-metric">Director's Note Vault</div>
                <textarea id="notesArea" placeholder="Log adjustments here. (e.g. Ensure Faith Farrell hits her mark during the blackout, keep Aman's dialogue conversational and punchy rather than using physical comedy...)"></textarea>
            </div>
        </div>

        <div class="studio-card">
            <div class="summary-metric">Production Status Summary</div>
            <div style="display: flex; gap: 40px; margin-top: 1rem; flex-wrap: wrap;">
                <div>
                    <div class="summary-metric">Cues Executed</div>
                    <div id="cue-stat" class="metric-value">0 / 0</div>
                </div>
                <div>
                    <div class="summary-metric">Active Map Elements</div>
                    <div id="prop-stat" class="metric-value">0</div>
                </div>
                <div>
                    <div class="summary-metric">Saved Scripts</div>
                    <div id="script-stat" class="metric-value">0</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- Timer Logic ---
        let timerRunning = false;
        let timeElapsed = parseInt(localStorage.getItem('studioTime')) || 0;
        let interval;

        window.onload = () => {
            const notes = document.getElementById('notesArea');
            notes.value = localStorage.getItem('studioNotes') || "";
            
            // Auto-save notes
            notes.oninput = () => localStorage.setItem('studioNotes', notes.value);
            
            updateDisplay();
            calculateSummary();
            
            // Refresh summary every few seconds in case other tabs updated data
            setInterval(calculateSummary, 2000);
        };

        function toggleTimer() {
            const btn = document.getElementById('startBtn');
            if (!timerRunning) {
                timerRunning = true;
                btn.innerText = "Stop Session";
                btn.style.background = "var(--movement-red)";
                btn.style.color = "#fff";
                interval = setInterval(() => {
                    timeElapsed++;
                    localStorage.setItem('studioTime', timeElapsed);
                    updateDisplay();
                }, 1000);
            } else {
                timerRunning = false;
                btn.innerText = "Resume Session";
                btn.style.background = "var(--border-ink)";
                btn.style.color = "var(--bg-paper)";
                clearInterval(interval);
            }
        }

        function updateDisplay() {
            const h = String(Math.floor(timeElapsed / 3600)).padStart(2, '0');
            const m = String(Math.floor((timeElapsed % 3600) / 60)).padStart(2, '0');
            const s = String(timeElapsed % 60).padStart(2, '0');
            document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
        }

        function resetTimer() {
            if(confirm("Reset session timer?")) {
                clearInterval(interval);
                timerRunning = false;
                timeElapsed = 0;
                localStorage.setItem('studioTime', 0);
                updateDisplay();
                const btn = document.getElementById('startBtn');
                btn.innerText = "Start Session";
                btn.style.background = "var(--border-ink)";
                btn.style.color = "var(--bg-paper)";
            }
        }

        // --- Data Aggregation Logic ---
        function calculateSummary() {
            // 1. Cues
            const cues = JSON.parse(localStorage.getItem('studioCues')) || [];
            const doneCues = cues.filter(c => c.status === 'done').length;
            document.getElementById('cue-stat').innerText = `${doneCues} / ${cues.length}`;

            // 2. Map Elements (from current working map)
            const mapData = JSON.parse(localStorage.getItem('studioMapData')) || {};
            const elements = mapData.data ? Object.keys(mapData.data).length : 0;
            document.getElementById('prop-stat').innerText = elements;

            // 3. Saved Scripts
            const savedScripts = JSON.parse(localStorage.getItem('stageLead_savedScripts')) || {};
            document.getElementById('script-stat').innerText = Object.keys(savedScripts).length;
        }
    </script>
</body>
</html>
