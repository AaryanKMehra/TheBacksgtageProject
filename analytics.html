<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analytics | Stage Lead Studio</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .analytics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        #timer-display {
            font-size: 5rem;
            font-weight: 200;
            font-family: 'Courier New', Courier, monospace;
            margin: 2rem 0;
            letter-spacing: -2px;
        }

        .note-vault {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #notesArea {
            flex-grow: 1;
            background: #000;
            border: 1px solid var(--border-subtle);
            color: var(--accent-white);
            padding: 1.5rem;
            font-family: var(--font-main);
            resize: none;
            line-height: 1.8;
        }

        .summary-metric {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-grey);
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        @media (max-width: 900px) {
            .analytics-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">TheBackstageProject</div>
        <ul>
            <li><a href="index.html">Vault</a></li>
            <li><a href="props.html">Map</a></li>
            <li><a href="cues.html">Cues</a></li>
            <li><a href="analytics.html" class="active">Analytics</a></li>
        </ul>
    </nav>

    <main>
        <div class="section-header">
            <h1>Performance Analytics</h1>
        </div>

        <div class="analytics-grid">
            <div class="studio-card">
                <div class="summary-metric">Active Run Time</div>
                <div id="timer-display">00:00:00</div>
                <div style="display: flex; gap: 10px;">
                    <button id="startBtn" onclick="toggleTimer()">Start Session</button>
                    <button class="secondary" onclick="resetTimer()">Reset</button>
                </div>
            </div>

            <div class="studio-card note-vault">
                <div class="summary-metric">Director's Note Vault</div>
                <textarea id="notesArea" placeholder="Log adjustments for Aman, Faith, and the technical crew..."></textarea>
            </div>
        </div>

        <div class="studio-card">
            <div class="summary-metric">Production Status Summary</div>
            <div style="display: flex; gap: 40px; margin-top: 1rem;">
                <div>
                    <div class="summary-metric">Cues Executed</div>
                    <div id="cue-stat" class="metric-value">0 / 0</div>
                </div>
                <div>
                    <div class="summary-metric">Stage Complexity</div>
                    <div id="prop-stat" class="metric-value">0 Elements</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let timerRunning = false;
        let timeElapsed = parseInt(localStorage.getItem('studioTime')) || 0;
        let interval;

        // Initialize Notes and Data
        window.onload = () => {
            const notes = document.getElementById('notesArea');
            notes.value = localStorage.getItem('studioNotes') || "";
            
            // Auto-save notes
            notes.oninput = () => localStorage.setItem('studioNotes', notes.value);
            
            updateDisplay();
            calculateSummary();
        };

        function toggleTimer() {
            const btn = document.getElementById('startBtn');
            if (!timerRunning) {
                timerRunning = true;
                btn.innerText = "Stop Session";
                btn.style.background = "var(--movement-blue)";
                btn.style.color = "#fff";
                interval = setInterval(() => {
                    timeElapsed++;
                    localStorage.setItem('studioTime', timeElapsed);
                    updateDisplay();
                }, 1000);
            } else {
                timerRunning = false;
                btn.innerText = "Resume Session";
                btn.style.background = "var(--accent-white)";
                btn.style.color = "var(--bg-deep)";
                clearInterval(interval);
            }
        }

        function updateDisplay() {
            const h = String(Math.floor(timeElapsed / 3600)).padStart(2, '0');
            const m = String(Math.floor((timeElapsed % 3600) / 60)).padStart(2, '0');
            const s = String(timeElapsed % 60).padStart(2, '0');
            document.getElementById('timer-display').innerText = `${h}:${m}:${secs = s}`;
        }

        function resetTimer() {
            if(confirm("Reset session timer?")) {
                clearInterval(interval);
                timerRunning = false;
                timeElapsed = 0;
                localStorage.setItem('studioTime', 0);
                updateDisplay();
                document.getElementById('startBtn').innerText = "Start Session";
            }
        }

        function calculateSummary() {
            // Pull data from other pages via LocalStorage
            const cues = JSON.parse(localStorage.getItem('studioCues')) || [];
            const props = JSON.parse(localStorage.getItem('studioMapData')) || {};
            
            const doneCues = cues.filter(c => c.status === 'done').length;
            const propCount = Object.keys(props).length;

            document.getElementById('cue-stat').innerText = `${doneCues} / ${cues.length}`;
            document.getElementById('prop-stat').innerText = `${propCount} Elements`;
        }
    </script>
</body>
</html>
