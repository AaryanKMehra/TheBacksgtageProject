<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stage Lead | Script Vault</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">STAGE LEAD</div>
        <ul>
            <li><a href="index.html" class="active">Vault</a></li>
            <li><a href="props.html">Stage Map</a></li>
            <li><a href="cues.html">Cues</a></li>
            <li><a href="analytics.html">Analytics</a></li>
        </ul>
    </nav>

    <main>
        <h1>Script Vault</h1>
        <div class="card">
            <h3>Upload Production Script (.txt)</h3>
            <input type="file" id="scriptUpload" accept=".txt">
        </div>

        <div class="card" id="filter-controls" style="display:none;">
            <label>Filter by Character: </label>
            <select id="charFilter" onchange="filterScript()">
                <option value="ALL">Show All</option>
            </select>
        </div>

        <div id="script-display" class="card" style="white-space: pre-wrap; display:none;">
            </div>
    </main>

    <script>
        const upload = document.getElementById('scriptUpload');
        const display = document.getElementById('script-display');
        const filterControls = document.getElementById('filter-controls');
        const charSelect = document.getElementById('charFilter');

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = (event) => {
                const text = event.target.result;
                localStorage.setItem('rawScript', text);
                processScript(text);
            };
            reader.readAsText(file);
        });

        function processScript(text) {
            display.style.display = 'block';
            display.innerText = text;
            filterControls.style.display = 'block';

            // Find all capitalized names (Common screenplay format)
            const names = [...new Set(text.match(/^[A-Z]{2,}(?=:)/gm))];
            charSelect.innerHTML = '<option value="ALL">Show All</option>';
            names.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.innerText = name;
                charSelect.appendChild(opt);
            });
        }

        function filterScript() {
            const char = charSelect.value;
            const text = localStorage.getItem('rawScript');
            if (char === 'ALL') {
                display.innerText = text;
            } else {
                // Simplified filter: highlights lines starting with the name
                const lines = text.split('\n');
                display.innerHTML = lines.map(line => 
                    line.startsWith(char) ? `<strong>${line}</strong>` : `<span style="opacity:0.3">${line}</span>`
                ).join('\n');
            }
        }
    </script>
</body>
</html>
