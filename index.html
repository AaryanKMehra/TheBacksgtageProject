<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vault | Stage Lead Studio</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Ensures highlighted lines pop and take up full width */
        .highlight {
            background-color: var(--accent-navy);
            color: #ffffff !important;
            padding: 4px 8px;
            font-weight: bold;
            display: block; /* Forces line break even if original text doesn't have one */
            min-height: 1.2em;
        }
        .dimmed {
            opacity: 0.15;
            transition: opacity 0.3s ease;
            display: block;
            min-height: 1.2em;
        }
        #script-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">STAGE LEAD</div>
        <ul>
            <li><a href="index.html" class="active">Vault</a></li>
            <li><a href="props.html">Map</a></li>
            <li><a href="cues.html">Cues</a></li>
            <li><a href="analytics.html">Analytics</a></li>
        </ul>
    </nav>

    <main>
        <div class="section-header">
            <h1>Script Vault</h1>
        </div>

        <div class="studio-card">
            <h3 style="font-size: 0.7rem; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 15px;">UPLOAD PRODUCTION SCRIPT (.TXT)</h3>
            <input type="file" id="scriptUpload" accept=".txt">
        </div>

        <div class="studio-card" id="filter-wrap" style="display:none; border-color: var(--accent-navy);">
            <div style="display: flex; gap: 20px; align-items: center;">
                <label style="font-size: 0.7rem; font-weight: 900;">FOCUS CHARACTER:</label>
                <select id="charSelect" onchange="applyFocus()"></select>
                <button class="secondary" onclick="resetVault()" style="margin-left: auto;">Clear Vault</button>
            </div>
        </div>

        <div id="script-container" class="studio-card" style="display:none; padding: 2.5rem; overflow-y: auto; max-height: 65vh;">
            <div id="script-content"></div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('scriptUpload');
        const contentArea = document.getElementById('script-content');
        const container = document.getElementById('script-container');
        const filterWrap = document.getElementById('filter-wrap');
        const selector = document.getElementById('charSelect');

        window.onload = () => {
            const saved = localStorage.getItem('studioScript');
            if (saved) loadScriptToUI(saved);
        };

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                localStorage.setItem('studioScript', text);
                loadScriptToUI(text);
            };
            reader.readAsText(file);
        });

        function loadScriptToUI(text) {
            container.style.display = 'block';
            filterWrap.style.display = 'block';
            contentArea.innerText = text;

            // Updated Regex to find all-caps names followed by a colon or space
            const matches = text.match(/^[A-Z\s]{2,}(?=:|\s)/gm);
            const characters = [...new Set(matches)].map(name => name.trim()).filter(n => n.length > 1);
            
            selector.innerHTML = '<option value="ALL">FULL ENSEMBLE</option>';
            characters.forEach(char => {
                const opt = document.createElement('option');
                opt.value = char;
                opt.innerText = char;
                selector.appendChild(opt);
            });
        }

        function applyFocus() {
            const focusChar = selector.value;
            const originalText = localStorage.getItem('studioScript');
            
            if (focusChar === 'ALL') {
                contentArea.innerHTML = originalText.split('\n').map(l => `<div>${l || '&nbsp;'}</div>`).join('');
                return;
            }

            // Split by newline and map each line individually
            const lines = originalText.split('\n');
            contentArea.innerHTML = lines.map(line => {
                const trimmedLine = line.trim();
                // Check if the line starts with the character name
                if (trimmedLine.startsWith(focusChar)) {
                    return `<div class="highlight">${line}</div>`;
                } else {
                    // Use &nbsp; to preserve empty lines for spacing
                    return `<div class="dimmed">${line || '&nbsp;'}</div>`;
                }
            }).join('');
        }

        function resetVault() {
            if(confirm("Clear script?")) {
                localStorage.removeItem('studioScript');
                location.reload();
            }
        }
    </script>
</body>
</html>
