<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vault | Stage Lead Studio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">STAGE LEAD</div>
        <ul>
            <li><a href="index.html" class="active">Vault</a></li>
            <li><a href="props.html">Map</a></li>
            <li><a href="cues.html">Cues</a></li>
            <li><a href="analytics.html">Analytics</a></li>
        </ul>
    </nav>

    <main>
        <div class="section-header">
            <h1>Script Vault</h1>
        </div>

        <div class="studio-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3 style="font-size: 0.8rem; letter-spacing: 1px; color: var(--accent-grey); margin-bottom: 10px;">IMPORT PRODUCTION SCRIPT</h3>
                    <input type="file" id="scriptUpload" accept=".txt">
                </div>
                <div id="status-tag" style="font-size: 0.6rem; padding: 4px 8px; border: 1px solid var(--border-subtle); color: var(--accent-grey);">NO FILE LOADED</div>
            </div>
        </div>

        <div class="studio-card" id="filter-wrap" style="display:none; border-color: var(--accent-white);">
            <div style="display: flex; gap: 20px; align-items: center;">
                <label style="font-size: 0.7rem; font-weight: 800;">CHARACTER FOCUS:</label>
                <select id="charSelect" onchange="applyFocus()"></select>
                <button class="secondary" onclick="resetVault()" style="margin-left: auto;">Clear Vault</button>
            </div>
        </div>

        <div id="script-container" class="studio-card" style="display:none; padding: 3rem; overflow-y: auto; max-height: 60vh;">
            <div id="script-content" style="white-space: pre-wrap; font-family: 'Courier New', Courier, monospace; font-size: 0.95rem; line-height: 1.8;">
                </div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('scriptUpload');
        const contentArea = document.getElementById('script-content');
        const container = document.getElementById('script-container');
        const filterWrap = document.getElementById('filter-wrap');
        const selector = document.getElementById('charSelect');
        const statusTag = document.getElementById('status-tag');

        // Check for existing script on load
        window.onload = () => {
            const saved = localStorage.getItem('studioScript');
            if (saved) loadScriptToUI(saved);
        };

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                localStorage.setItem('studioScript', text);
                loadScriptToUI(text);
            };
            reader.readAsText(file);
        });

        function loadScriptToUI(text) {
            container.style.display = 'block';
            filterWrap.style.display = 'block';
            contentArea.innerText = text;
            statusTag.innerText = "FILE ACTIVE";
            statusTag.style.borderColor = "var(--accent-white)";
            statusTag.style.color = "var(--accent-white)";

            // Detect characters (Words ending with colon at start of line)
            const matches = text.match(/^[A-Z\s]{2,}(?=:)/gm);
            const characters = [...new Set(matches)];
            
            selector.innerHTML = '<option value="ALL">FULL ENSEMBLE</option>';
            characters.forEach(char => {
                const opt = document.createElement('option');
                opt.value = char;
                opt.innerText = char;
                selector.appendChild(opt);
            });
        }

        function applyFocus() {
            const focusChar = selector.value;
            const originalText = localStorage.getItem('studioScript');
            
            if (focusChar === 'ALL') {
                contentArea.innerText = originalText;
                return;
            }

            const lines = originalText.split('\n');
            contentArea.innerHTML = lines.map(line => {
                if (line.startsWith(focusChar)) {
                    return `<span style="color: var(--accent-white); background: #1a1a1a; padding: 2px 0;">${line}</span>`;
                } else {
                    return `<span style="opacity: 0.15; transition: opacity 0.3s;">${line}</span>`;
                }
            }).join('\n');
        }

        function resetVault() {
            if(confirm("Purge script from local storage?")) {
                localStorage.removeItem('studioScript');
                location.reload();
            }
        }
    </script>
</body>
</html>
